<?xml version="1.0" encoding="UTF-8"?>
<!--
  Followthrough — Icon / App Mark
  Diagonal amber/navy split with white F.
  Scales from 16px favicon to hero size.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140">
  <defs>
    <clipPath id="rr">
      <rect width="140" height="140" rx="30"/>
    </clipPath>
  </defs>

  <!-- Amber base (top-left) -->
  <rect width="140" height="140" rx="30" fill="#D08820"/>

  <!-- Navy diagonal fill (bottom-right triangle) -->
  <!-- Diagonal runs from top-right corner (140,0) to bottom-left corner (0,140) -->
  <polygon points="140,0 140,140 0,140" fill="#1C2340" clip-path="url(#rr)"/>

  <!-- White F -->
  <!-- Stem -->
  <rect x="30" y="22" width="18" height="96" fill="white"/>
  <!-- Top bar -->
  <rect x="30" y="22" width="77" height="17" fill="white"/>
  <!-- Mid bar -->
  <rect x="30" y="59" width="52" height="16" fill="white"/>
</svg>
