<?xml version="1.0" encoding="UTF-8"?>
<!--
  Followthrough — White Lockup (for dark / themed backgrounds)
  Use this version on Graphite, Harbor, Cedar, or Cinder backgrounds.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 140">

  <!-- ── ICON MARK (white on transparent) ── -->

  <!-- No rounded square bg — mark floats on whatever background is beneath -->
  <!-- Swoosh arc -->
  <path d="M 32 108 C 30 47, 68 19, 92 38"
        stroke="white" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- Impact dot -->
  <circle cx="32" cy="108" r="7" fill="white"/>

  <!-- Arrowhead chevron -->
  <polyline points="86,20 92,38 73,36"
            stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ── WORDMARK (white) ── -->

  <text x="164" y="88"
        font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="800"
        font-size="50"
        fill="white"
        letter-spacing="-1.5">Followthrough</text>

</svg>
